<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto · Mi Sitio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/custom.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/">Mi Sitio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="/about.html">Sobre mí</a></li>
        <li class="nav-item"><a class="nav-link active" href="/contact.html">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container">
  <h1 class="mb-3">Contacto</h1>
  <p class="lead">Envíanos un mensaje y te responderemos pronto.</p>
  <form class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" placeholder="Tu nombre">
    </div>
    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="tu@email.com">
    </div>
    <div class="col-12">
      <label class="form-label">Mensaje</label>
      <textarea class="form-control" rows="5" placeholder="¿En qué podemos ayudarte?"></textarea>
    </div>
    <div class="col-12">
      <button class="btn btn-primary">Enviar</button>
    </div>
  </form>
</main>

<footer class="container text-center">
  <small>&copy; <span id="year"></span> Mi Sitio</small>
</footer>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
