<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName DockerContainer
    ServerAdmin webmaster@DockerContainer

    # Tu web
    DocumentRoot /var/www/html/miweb

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/ssl-access.log combined

    # Prioridad de índice y permisos
    <Directory /var/www/html/miweb>
        DirectoryIndex index.php index.html
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --- SSL/TLS ---
    SSLEngine on
    SSLCertificateFile      /etc/ssl/apache/apache-container.crt
    SSLCertificateKeyFile   /etc/ssl/apache/apache-container.key

    # Protocolos seguros
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLOpenSSLConfCmd Curves X25519:secp384r1:secp256r1

    # HTTP/2 si está habilitado el módulo
    Protocols h2 http/1.1

    # (Opcional) Cabeceras de seguridad
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

</VirtualHost>
</IfModule>
