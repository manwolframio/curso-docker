# Usuario que ejecuta los procesos worker de nginx
# Este usuario debe estar en el grupo 'www-data' para poder acceder al socket de PHP-FPM
user nginx;

# Número de procesos worker (auto = número de CPUs disponibles)
worker_processes auto;

# PID file
pid /var/run/nginx.pid;

events {
    # Máximo número de conexiones simultáneas por worker
    worker_connections 1024;
}

http {
    ##
    # Archivos MIME
    ##
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    ##
    # Logs integrados con Docker
    ##
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    ##
    # Configuración básica de rendimiento
    ##
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    ##
    # Tamaño máximo permitido para uploads
    ##
    client_max_body_size 50M;

    ##
    # Incluir todos los virtual hosts en conf.d
    ##
    include /etc/nginx/conf.d/*.conf;
}
