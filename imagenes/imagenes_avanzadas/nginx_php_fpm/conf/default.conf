server {
    listen 80;
    server_name dockercontainer;

    root /var/www/dockercontainer/public;
    index index.php index.html;

    access_log /var/log/nginx/dockercontainer-access.log;
    error_log  /var/log/nginx/dockercontainer-error.log error;

    # Manejo de URLs limpias
    location / {
        try_files $uri /index.php?$query_string;
    }

    # Procesamiento de archivos PHP
    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
    }

    # Desactivar caché en desarrollo
    location ~* \.(css|less|js|jpg|png|gif)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
